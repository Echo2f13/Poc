<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MicroAmazon - Products</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="navbar" id="navbar"></div>
  <div class="sub-nav">
    <a href="/products.html">All Products</a>
    <a href="/products.html">Today's Deals</a>
    <a href="/products.html">Electronics</a>
    <a href="/products.html">Accessories</a>
    <a href="/orders.html">Order History</a>
  </div>

  <div class="container">
    <div class="hero-banner" id="heroBanner">
      <div class="hero-content">
        <h2>Welcome to MicroAmazon</h2>
        <p>Discover amazing deals on electronics and accessories</p>
      </div>
      <div class="hero-stats" id="heroStats"></div>
    </div>

    <div class="page-header">
      <h1 class="page-title">Results</h1>
      <span class="results-count" id="resultsCount"></span>
    </div>

    <div class="product-grid" id="productGrid">
      <p>Loading products...</p>
    </div>

    <div class="add-section" id="addSection">
      <div class="add-section-header" onclick="toggleAddForm()">
        <h3>Sell on MicroAmazon</h3>
        <span class="toggle-icon">&#9660;</span>
      </div>
      <div class="add-form-wrapper">
        <div class="add-form">
          <div class="form-group">
            <label for="prodName">Product Name</label>
            <input type="text" id="prodName" placeholder="e.g. Wireless Headphones">
          </div>
          <div class="form-group">
            <label for="prodPrice">Price ($)</label>
            <input type="number" id="prodPrice" placeholder="e.g. 49.99" step="0.01" min="0">
          </div>
          <button class="btn btn-primary" onclick="addProduct()">List Product</button>
        </div>
      </div>
    </div>
  </div>

  <footer class="site-footer">
    &copy; 2026 MicroAmazon (NestJS POC) &mdash;
    <a href="/products.html">Products</a>
    <a href="/orders.html">Orders</a>
  </footer>

  <script src="/js/api.js"></script>
  <script src="/js/products.js"></script>
</body>
</html>
